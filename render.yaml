# Render Blueprint - Gestao de Candidatos AP
# Criar via Render: New > Blueprint > apontar para este repositorio.
services:
  - type: web
      name: gestao-candidatos-ap
          env: python
              plan: free
                  region: oregon
                      buildCommand: "pip install -r requirements.txt"
                          startCommand: "gunicorn wsgi:app --workers 2 --timeout 120"
                              healthCheckPath: /health
                                  preDeployCommand: "flask db upgrade && flask seed"
                                      autoDeploy: true
                                          envVars:
                                                - key: PYTHON_VERSION
                                                        value: 3.11.9
                                                              - key: SECRET_KEY
                                                                      generateValue: true
                                                                            - key: DATABASE_URL
                                                                                    fromDatabase:
                                                                                              name: gestao-candidatos-db
                                                                                                        property: connectionString
                                                                                                              - key: CONVERTS_BASE_URL
                                                                                                                      value: https://app.converts.com.br
                                                                                                                            - key: CONVERTS_LOGIN
                                                                                                                                    sync: false
                                                                                                                                          - key: CONVERTS_SENHA
                                                                                                                                                  sync: false
                                                                                                                                                        - key: ADMIN_EMAIL
                                                                                                                                                                value: admin@empresa.com
                                                                                                                                                                      - key: ADMIN_PASSWORD
                                                                                                                                                                              sync: false
                                                                                                                                                                                    - key: ADMIN_NAME
                                                                                                                                                                                            value: Administrador
                                                                                                                                                                                                  - key: ENABLE_SCHEDULER
                                                                                                                                                                                                          value: true
                                                                                                                                                                                                                - key: SYNC_HOUR
                                                                                                                                                                                                                        value: 23
                                                                                                                                                                                                                              - key: SYNC_MINUTE
                                                                                                                                                                                                                                      value: 30
                                                                                                                                                                                                                                            - key: TZ
                                                                                                                                                                                                                                                    value: America/Sao_Paulo
                                                                                                                                                                                                                                                          - key: FLASK_APP
                                                                                                                                                                                                                                                                  value: wsgi.py
                                                                                                                                                                                                                                                                        - key: FLASK_ENV
                                                                                                                                                                                                                                                                                value: production
                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                databases:
                                                                                                                                                                                                                                                                                  - name: gestao-candidatos-db
                                                                                                                                                                                                                                                                                      plan: free
                                                                                                                                                                                                                                                                                          databaseName: gestao_candidatos
                                                                                                                                                                                                                                                                                              user: gestao_candidatos
                                                                                                                                                                                                                                                                                              
